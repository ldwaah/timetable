<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff timetable</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      padding: 2rem 1.25rem;
      max-width: 720px;
      margin: 0 auto;
    }

    .top { margin-bottom: 2rem; }

    a.back {
      color: #58a6ff;
      text-decoration: none;
      font-size: 0.9rem;
    }

    a.back:hover { text-decoration: underline; }

    h1 {
      margin-top: 1rem;
      font-size: 1.5rem;
      font-weight: 600;
      color: #f0f6fc;
    }

    .staff-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 1.25rem;
    }

    .staff-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      padding: 2rem 1rem;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
    }

    .staff-card:hover {
      border-color: #a371f7;
      background: #1c2128;
      transform: translateY(-2px);
    }

    .staff-card:focus-visible {
      outline: 2px solid #a371f7;
      outline-offset: 2px;
    }

    .staff-avatar {
      width: 64px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: linear-gradient(135deg, #3d1f5f 0%, #a371f733 100%);
      font-size: 1.4rem;
      font-weight: 700;
      color: #d2a8ff;
      letter-spacing: 0.02em;
    }

    .staff-name {
      font-size: 0.9rem;
      font-weight: 500;
      color: #f0f6fc;
    }
</style>
</head>
<body>
  <div class="top">
    <a class="back" href="index.html">← Back</a>
    <h1>Staff timetable</h1>
  </div>

  <nav class="staff-grid" aria-label="Staff members">
    <a class="staff-card" href="staff/lorelle.html"><span class="staff-avatar">LG</span><span class="staff-name">Lorelle</span></a><a class="staff-card" href="staff/lloyd.html"><span class="staff-avatar">LD</span><span class="staff-name">Lloyd</span></a><a class="staff-card" href="staff/laurent.html"><span class="staff-avatar">LI</span><span class="staff-name">Laurent</span></a><a class="staff-card" href="staff/sacha.html"><span class="staff-avatar">SA</span><span class="staff-name">Sacha</span></a><a class="staff-card" href="staff/jeff.html"><span class="staff-avatar">JC</span><span class="staff-name">Jeff</span></a><a class="staff-card" href="staff/janet.html"><span class="staff-avatar">JM</span><span class="staff-name">Janet</span></a><a class="staff-card" href="staff/hisham.html"><span class="staff-avatar">HK</span><span class="staff-name">Hisham</span></a>
  </nav>
</body>
</html>
